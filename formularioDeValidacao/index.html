<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulário</title>
    <link rel="stylesheet" href="styloVld.css">
    <script src="scriptVld.js" defer></script>
</head>
<body>
    <h1>Formulário de Validação com JavaScript</h1>
    <form id="form">
        <label for="name">Nome:</label>
        <input type="text" id="name" name="name" required>
        <span class="error-message" id="nameError"></span>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <span class="error-message" id="emailError"></span>

        <label for="password">Senha:</label>
        <input type="password" id="password" name="password" required>
        <span class="error-message" id="passwordError"></span>

        <label for="job">Situação atual</label>
        <select id="job" name="job" required>
            <option value="">Selecione</option>
            <option value="estudante">Estudante</option>
            <option value="empregado">Empregado</option>
            <option value="desempregado">Desempregado</option>
        </select>
       <span class="error-message" id="jobError"></span>

        <label for="message">Mensagem:</label>
        <textarea id="message" name="message" placeholder="Digite sua mensagem (opcional)aqui..."></textarea>
       

        <button id="submit" type="submit">Enviar</button>
        <button id="reset" type="reset">Limpar</button>
</body>
</html>
